name: Release binaries

# Push a version tag (`git tag v0.3.0 && git push --tags`) to build the standalone tok
# binary for every platform and attach it to the GitHub Release. arm64 targets must build
# on a native arm runner (pkg can't cross-build those); x64 targets build anywhere, so the
# macOS x64 binary is built on Linux to skip the scarce, slow-to-schedule Intel-mac runner.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node22-win-x64
            out: tok-windows-x64.exe
          - os: ubuntu-latest
            target: node22-linux-x64
            out: tok-linux-x64
          - os: ubuntu-24.04-arm
            target: node22-linux-arm64
            out: tok-linux-arm64
          - os: ubuntu-latest
            target: node22-macos-x64
            out: tok-macos-x64
          - os: macos-14
            target: node22-macos-arm64
            out: tok-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps (skip hook setup on CI)
        run: npm install
        env:
          TOK_SKIP_SETUP: '1'
      - name: Compile
        run: npm run build
      - name: Package native binary
        run: npx pkg dist/main.js --targets ${{ matrix.target }} --output build/${{ matrix.out }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.out }}
